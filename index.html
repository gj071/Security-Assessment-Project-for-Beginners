<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File System Security Assessment Project</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #6600ff;
            --bg-color: #0b0c10;
            --text-color: #c5c6c7;
            --card-bg: rgba(31, 40, 51, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(102, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 204, 0.15) 0%, transparent 50%);
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            padding: 3rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            color: #ffffff;
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            letter-spacing: -0.05em;
        }

        .highlight {
            background: linear-gradient(135deg, var(--primary), #00b3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            color: #8b9bb4;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--bg-color);
            background: var(--primary);
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            background: #ffffff;
        }

        .shield-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
            display: inline-block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .tech-badge {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 0.9rem;
            color: #fff;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="shield-icon">🛡️</div>
        <h1><span class="highlight">File System</span> Security Research</h1>
        <p>A comprehensive assessment and empirical research project analyzing modern file system vulnerabilities, permissions auditing, and forensic artifacts.</p>

        <a href="research-paper.html" class="btn">Read the Interactive Paper</a>

        <div class="tech-stack">
            <span class="tech-badge">Python Scripts</span>
            <span class="tech-badge">Security Analysis</span>
            <span class="tech-badge">Access Controls</span>
        </div>
    </div>

</body>
</html>
